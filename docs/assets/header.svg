      <stop offset="40%"  stop-color="#1f6feb"/>
      <stop offset="100%" stop-color="#8957e5"/>
    </linearGradient>

    <clipPath id="outer">
      <rect width="830" height="140" rx="8"/>
    </clipPath>
  </defs>

