<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lesson 1 Quiz — GitHub Basics</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      background: #0d1117;
      color: #e6edf3;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2.5rem 1rem 4rem;
    }

    .container {
      width: 100%;
      max-width: 660px;
    }

    header {
      text-align: center;
      margin-bottom: 2.5rem;
    }

    header .eyebrow {
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: #7d8590;
      margin-bottom: 0.6rem;
    }

    header h1 {
      font-size: 1.6rem;
      font-weight: 700;
      color: #e6edf3;
    }

    /* ── Screens ── */
    .screen { display: none; }
    .screen.active { display: block; }

    /* ── Card ── */
    .card {
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 12px;
      padding: 2rem;
    }

    /* ── Name screen ── */
    #screen-name .card h2 {
      font-size: 1.1rem;
      font-weight: 600;
      margin-bottom: 0.4rem;
    }

    #screen-name .card p {
      font-size: 0.9rem;
      color: #7d8590;
      margin-bottom: 1.5rem;
      line-height: 1.5;
    }

    .field label {
      display: block;
      font-size: 0.85rem;
      font-weight: 500;
      color: #7d8590;
      margin-bottom: 0.4rem;
    }

    .field input {
      width: 100%;
      background: #0d1117;
      border: 1px solid #30363d;
      border-radius: 6px;
      color: #e6edf3;
      font-size: 1rem;
      padding: 0.55rem 0.75rem;
      outline: none;
      transition: border-color 0.15s;
    }

    .field input:focus {
      border-color: #58a6ff;
    }

    .field input::placeholder {
      color: #484f58;
    }

    /* ── Buttons ── */
    .btn {
      display: inline-block;
      font-size: 0.9rem;
      font-weight: 600;
      padding: 0.55rem 1.25rem;
      border-radius: 6px;
      border: none;
      cursor: pointer;
      transition: background 0.15s, opacity 0.15s;
    }

    .btn-primary {
      background: #238636;
      color: #fff;
      width: 100%;
      margin-top: 1.25rem;
      padding: 0.65rem;
      font-size: 0.95rem;
    }

    .btn-primary:hover:not(:disabled) { background: #2ea043; }
    .btn-primary:disabled { opacity: 0.4; cursor: not-allowed; }

    .btn-next {
      background: #21262d;
      color: #e6edf3;
      border: 1px solid #30363d;
      margin-top: 1.25rem;
    }

    .btn-next:hover { background: #30363d; }

    /* ── Progress ── */
    .progress-row {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      margin-bottom: 1.5rem;
    }

    .progress-label {
      font-size: 0.8rem;
      color: #7d8590;
      white-space: nowrap;
      min-width: 6rem;
    }

    .progress-bar {
      flex: 1;
      height: 4px;
      background: #21262d;
      border-radius: 2px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      background: #238636;
      border-radius: 2px;
      transition: width 0.4s ease;
    }

    /* ── Question ── */
    .question-text {
      font-size: 1.05rem;
      font-weight: 600;
      line-height: 1.5;
      margin-bottom: 1.25rem;
    }

    /* ── Options ── */
    .options {
      display: flex;
      flex-direction: column;
      gap: 0.6rem;
    }

    .option {
      display: flex;
      align-items: flex-start;
      gap: 0.75rem;
      padding: 0.75rem 1rem;
      border: 1px solid #30363d;
      border-radius: 8px;
      cursor: pointer;
      transition: border-color 0.15s, background 0.15s;
      user-select: none;
    }

    .option:hover:not(.disabled) {
      border-color: #58a6ff;
      background: #1c2128;
    }

    .option.selected {
      border-color: #58a6ff;
      background: #1c2128;
    }

    .option.correct {
      border-color: #3fb950;
      background: #0d2a14;
    }

    .option.incorrect {
      border-color: #f85149;
      background: #2d1215;
    }

    .option.reveal-correct {
      border-color: #3fb950;
      background: #0d2a14;
    }

    .option.disabled { cursor: default; }

    .option-marker {
      flex-shrink: 0;
      width: 1.4rem;
      height: 1.4rem;
      border-radius: 50%;
      border: 2px solid #30363d;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.7rem;
      font-weight: 700;
      color: #7d8590;
      margin-top: 0.05rem;
      transition: border-color 0.15s, background 0.15s, color 0.15s;
    }

    .option.selected .option-marker {
      border-color: #58a6ff;
      color: #58a6ff;
    }

    .option.correct .option-marker,
    .option.reveal-correct .option-marker {
      border-color: #3fb950;
      background: #3fb950;
      color: #0d1117;
    }

    .option.incorrect .option-marker {
      border-color: #f85149;
      background: #f85149;
      color: #0d1117;
    }

    .option-text {
      font-size: 0.9rem;
      line-height: 1.45;
      color: #c9d1d9;
    }

    /* ── Explanation ── */
    .explanation {
      display: none;
      margin-top: 1.25rem;
      padding: 0.9rem 1rem;
      border-radius: 8px;
      font-size: 0.875rem;
      line-height: 1.55;
    }

    .explanation.correct {
      background: #0d2a14;
      border: 1px solid #3fb950;
      color: #aff4c6;
    }

    .explanation.incorrect {
      background: #2d1215;
      border: 1px solid #f85149;
      color: #ffa198;
    }

    .explanation .verdict {
      font-weight: 700;
      margin-bottom: 0.35rem;
    }

    .explanation.active { display: block; }

    /* ── Results screen ── */
    #screen-results .card {
      text-align: center;
    }

    .score-circle {
      width: 110px;
      height: 110px;
      border-radius: 50%;
      border: 4px solid #238636;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      margin: 0 auto 1.5rem;
    }

    .score-circle .score-num {
      font-size: 2rem;
      font-weight: 700;
      line-height: 1;
      color: #3fb950;
    }

    .score-circle .score-denom {
      font-size: 0.8rem;
      color: #7d8590;
      margin-top: 0.15rem;
    }

    #screen-results h2 {
      font-size: 1.2rem;
      font-weight: 700;
      margin-bottom: 0.4rem;
    }

    #screen-results .result-msg {
      font-size: 0.9rem;
      color: #7d8590;
      line-height: 1.5;
      margin-bottom: 1.75rem;
    }

    .result-breakdown {
      text-align: left;
      border-top: 1px solid #21262d;
      padding-top: 1.25rem;
    }

    .result-breakdown h3 {
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #7d8590;
      margin-bottom: 0.75rem;
    }

    .breakdown-item {
      display: flex;
      align-items: flex-start;
      gap: 0.6rem;
      margin-bottom: 0.5rem;
      font-size: 0.85rem;
      line-height: 1.4;
    }

    .breakdown-icon {
      flex-shrink: 0;
      font-size: 0.75rem;
      margin-top: 0.15rem;
    }

    .breakdown-item.pass .breakdown-icon { color: #3fb950; }
    .breakdown-item.fail .breakdown-icon { color: #f85149; }
    .breakdown-item.pass .breakdown-q { color: #c9d1d9; }
    .breakdown-item.fail .breakdown-q { color: #7d8590; }

    .back-link {
      display: inline-block;
      margin-top: 1.5rem;
      font-size: 0.85rem;
      color: #58a6ff;
      text-decoration: none;
    }

    .back-link:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <div class="eyebrow">Bioinformatics Intro — Lesson 1</div>
      <h1>GitHub Basics Quiz</h1>
    </header>

    <!-- Name screen -->
    <div id="screen-name" class="screen active">
      <div class="card">
        <h2>Before you begin</h2>
        <p>Enter your name so your result can be attributed correctly, then click Start.</p>
        <div class="field">
          <label for="name-input">Your name</label>
          <input id="name-input" type="text" placeholder="e.g. Jane Smith" autocomplete="off" />
        </div>
        <button class="btn btn-primary" id="btn-start" disabled>Start quiz</button>
      </div>
    </div>

    <!-- Question screen -->
    <div id="screen-question" class="screen">
      <div class="progress-row">
        <span class="progress-label" id="progress-label">Question 1 of 5</span>
        <div class="progress-bar">
          <div class="progress-fill" id="progress-fill" style="width: 0%"></div>
        </div>
      </div>
      <div class="card">
        <p class="question-text" id="question-text"></p>
        <div class="options" id="options-list"></div>
        <div class="explanation" id="explanation"></div>
        <button class="btn btn-next" id="btn-next" style="display:none">Next question →</button>
      </div>
    </div>

    <!-- Results screen -->
    <div id="screen-results" class="screen">
      <div class="card">
        <div class="score-circle">
          <span class="score-num" id="result-score"></span>
          <span class="score-denom" id="result-denom"></span>
        </div>
        <h2 id="result-heading"></h2>
        <p class="result-msg" id="result-msg"></p>
        <div class="result-breakdown">
          <h3>Breakdown</h3>
          <div id="breakdown-list"></div>
        </div>
        <a class="back-link" href="https://github.com/g-pyxl/bioinformatics_intro/tree/main/lessons/01_github_basics">
          ← Back to Lesson 1
        </a>
      </div>
    </div>
  </div>

  <script>
    const QUESTIONS = [
      {
        question: "What is a fork on GitHub?",
        options: [
          "A branch that can only be merged via pull request",
          "A copy of a repository under your own GitHub account",
          "A commit that introduces a breaking change",
          "A snapshot of a repository at a specific point in time"
        ],
        correct: 1,
        explanation: "A fork creates an independent copy of the repository under your own account. You can freely experiment without affecting the original — and when you're ready, propose your changes back via a pull request."
      },
      {
        question: "Why should you create a branch before making changes?",
        options: [
          "GitHub requires it — you cannot commit to a forked repo otherwise",
          "It compresses your commits to save storage space",
          "It isolates your work so the main branch stays unaffected",
          "It automatically syncs your changes with the original repository"
        ],
        correct: 2,
        explanation: "Branches let you develop in isolation. If something goes wrong, main is untouched. In clinical bioinformatics, direct commits to main are never made — changes always go through a branch and a pull request."
      },
      {
        question: "What does opening a pull request do?",
        options: [
          "Immediately merges your branch into main",
          "Downloads the latest changes from the original repository",
          "Proposes your changes for review before they are merged",
          "Creates a compressed archive of your branch"
        ],
        correct: 2,
        explanation: "A pull request opens a discussion around your proposed changes. Collaborators can review line by line, leave comments, and approve or request changes — providing a full, traceable audit trail before anything is merged."
      },
      {
        question: "What was the bug in gc_content.py?",
        options: [
          "The function forgot to convert the sequence to uppercase",
          "GC count was divided by the AT count instead of the total number of bases",
          "G and C were counted separately and never added together",
          "The result was multiplied by 10 instead of 100"
        ],
        correct: 1,
        explanation: "The denominator was (a_count + t_count) instead of len(sequence). For all-GC sequences this caused a ZeroDivisionError; for mixed sequences it inflated the result — ATGCATGC gave 100% instead of 50%."
      },
      {
        question: "Why are pull requests particularly important in clinical bioinformatics?",
        options: [
          "They are required by GitHub's terms of service for medical repositories",
          "They automatically run regulatory validation checks on pipeline code",
          "They ensure every change is reviewed before it can affect patient results",
          "They create a regulatory submission package from the pipeline code"
        ],
        correct: 2,
        explanation: "Clinical pipelines must be auditable and validated. The PR review step provides a second pair of eyes and a permanent, traceable record of who approved each change — an essential part of clinical quality management."
      }
    ];

    let userName = "";
    let current = 0;
    let answered = false;
    let results = [];

    // ── Name screen ──
    const nameInput = document.getElementById("name-input");
    const btnStart  = document.getElementById("btn-start");

    nameInput.addEventListener("input", () => {
      btnStart.disabled = nameInput.value.trim().length === 0;
    });

    nameInput.addEventListener("keydown", e => {
      if (e.key === "Enter" && !btnStart.disabled) startQuiz();
    });

    btnStart.addEventListener("click", startQuiz);

    function startQuiz() {
      userName = nameInput.value.trim();
      showScreen("screen-question");
      renderQuestion();
    }

    // ── Question screen ──
    function renderQuestion() {
      const q = QUESTIONS[current];
      answered = false;

      document.getElementById("progress-label").textContent =
        `Question ${current + 1} of ${QUESTIONS.length}`;
      document.getElementById("progress-fill").style.width =
        `${(current / QUESTIONS.length) * 100}%`;

      document.getElementById("question-text").textContent = q.question;

      const list = document.getElementById("options-list");
      list.innerHTML = "";
      const labels = ["A", "B", "C", "D"];

      q.options.forEach((text, i) => {
        const div = document.createElement("div");
        div.className = "option";
        div.dataset.index = i;
        div.innerHTML = `
          <div class="option-marker">${labels[i]}</div>
          <span class="option-text">${text}</span>
        `;
        div.addEventListener("click", () => selectOption(i));
        list.appendChild(div);
      });

      const exp = document.getElementById("explanation");
      exp.className = "explanation";
      exp.innerHTML = "";

      document.getElementById("btn-next").style.display = "none";
    }

    function selectOption(index) {
      if (answered) return;
      answered = true;

      const q = QUESTIONS[current];
      const correct = index === q.correct;
      results.push({ question: q.question, correct });

      const options = document.querySelectorAll(".option");
      options.forEach(opt => {
        opt.classList.add("disabled");
        const i = parseInt(opt.dataset.index);
        if (i === q.correct) opt.classList.add(correct ? "correct" : "reveal-correct");
        if (i === index && !correct) opt.classList.add("incorrect");
      });

      const exp = document.getElementById("explanation");
      exp.className = `explanation ${correct ? "correct" : "incorrect"} active`;
      exp.innerHTML = `
        <div class="verdict">${correct ? "Correct" : "Incorrect"}</div>
        ${q.explanation}
      `;

      const btnNext = document.getElementById("btn-next");
      btnNext.style.display = "inline-block";
      btnNext.textContent = current < QUESTIONS.length - 1 ? "Next question →" : "See results";
    }

    document.getElementById("btn-next").addEventListener("click", () => {
      current++;
      if (current < QUESTIONS.length) {
        renderQuestion();
      } else {
        showResults();
      }
    });

    // ── Results screen ──
    function showResults() {
      const score = results.filter(r => r.correct).length;
      const total = QUESTIONS.length;
      const pct   = score / total;

      document.getElementById("result-score").textContent = score;
      document.getElementById("result-denom").textContent = `out of ${total}`;

      const circle = document.querySelector(".score-circle");
      const scoreNum = document.querySelector(".score-circle .score-num");
      if (pct === 1) {
        circle.style.borderColor = "#3fb950";
        scoreNum.style.color = "#3fb950";
      } else if (pct >= 0.6) {
        circle.style.borderColor = "#d29922";
        scoreNum.style.color = "#d29922";
      } else {
        circle.style.borderColor = "#f85149";
        scoreNum.style.color = "#f85149";
      }

      const headings = {
        1:   "Perfect score!",
        0.8: "Great work!",
        0.6: "Good effort.",
        0:   "Keep at it."
      };
      const messages = {
        1:   `Well done, ${userName}. You have a solid grasp of the GitHub workflow covered in Lesson 1.`,
        0.8: `Nice work, ${userName}. Review the questions you missed and re-read the relevant background sections.`,
        0.6: `Good start, ${userName}. It's worth revisiting the lesson before moving on.`,
        0:   `That's okay, ${userName}. Work back through Lesson 1 and try again — it takes a couple of reads to click.`
      };

      const key = pct === 1 ? 1 : pct >= 0.8 ? 0.8 : pct >= 0.6 ? 0.6 : 0;
      document.getElementById("result-heading").textContent = headings[key];
      document.getElementById("result-msg").textContent = messages[key];

      const breakdownList = document.getElementById("breakdown-list");
      breakdownList.innerHTML = "";
      results.forEach(r => {
        const div = document.createElement("div");
        div.className = `breakdown-item ${r.correct ? "pass" : "fail"}`;
        div.innerHTML = `
          <span class="breakdown-icon">${r.correct ? "✓" : "✗"}</span>
          <span class="breakdown-q">${r.question}</span>
        `;
        breakdownList.appendChild(div);
      });

      document.getElementById("progress-fill").style.width = "100%";
      showScreen("screen-results");
    }

    // ── Utilities ──
    function showScreen(id) {
      document.querySelectorAll(".screen").forEach(s => s.classList.remove("active"));
      document.getElementById(id).classList.add("active");
    }
  </script>
</body>
</html>
